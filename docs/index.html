<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chotot Meta Ads — Creative Performance</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #fff; --line: #e6e8eb; --ink: #1a1a2e;
    --muted: #6b7280; --accent: #6d28d9; --green: #059669; --amber: #d97706; --red: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 20px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 20px; margin: 0; }
  .sub { color: var(--muted); font-size: 13px; }
  .range-select { font-size: 13px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--ink); cursor: pointer; margin-bottom: 6px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin: 22px 0; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
  .card .k { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .card .v { font-size: 24px; font-weight: 700; margin-top: 6px; }
  .card .v.accent { color: var(--accent); }
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 14px; }
  .tab {
    border: 1px solid var(--line); background: var(--card); border-radius: 999px;
    padding: 7px 14px; cursor: pointer; font-size: 13px; color: var(--muted);
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab .g { font-size: 10px; opacity: .7; margin-left: 6px; }
  .controls { display: flex; align-items: center; gap: 8px; margin: 4px 0 14px; }
  .ctl-label { font-size: 12px; color: var(--muted); }
  .ctl { border: 1px solid var(--line); background: var(--card); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; color: var(--muted); }
  .ctl.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .pill { display: inline-block; margin-left: 8px; padding: 1px 7px; border-radius: 999px; font-size: 11px; font-weight: 600; background: #ede9fe; color: var(--accent); }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .panel-head { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; gap: 18px; flex-wrap: wrap; align-items: baseline; }
  .panel-head b { font-size: 15px; }
  .panel-head span { color: var(--muted); font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); cursor: pointer; user-select: none; }
  th.sorted::after { content: " ▾"; color: var(--accent); }
  tbody tr:hover { background: #faf9ff; }
  td.name { font-weight: 600; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .f-green { background: #dcfce7; color: var(--green); }
  .f-amber { background: #fef3c7; color: var(--amber); }
  .f-red { background: #fee2e2; color: var(--red); }
  .foot { color: var(--muted); font-size: 12px; margin-top: 22px; text-align: center; }
  .err { padding: 40px; text-align: center; color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>📊 Chotot Meta Ads — Creative Performance</h1>
      <div class="sub" id="period">…</div>
    </div>
    <div style="text-align:right">
      <select id="range" class="range-select"></select>
      <div class="sub" id="generated">…</div>
    </div>
  </header>

  <div class="cards" id="cards"></div>
  <div class="tabs" id="tabs"></div>
  <div class="controls">
    <span class="ctl-label">Chế độ xem:</span>
    <button class="ctl" id="btn-grouped">Gom theo creative</button>
    <button class="ctl" id="btn-perad">Từng ad</button>
  </div>
  <div id="panel"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const CUR = "SGD";
let RAW = null, RANGES = {}, curRange = null;
let DATA = null, activeIdx = 0, sortKey = "spend", sortDir = -1, grouped = true;

const fmtInt = n => n.toLocaleString("en-US");
const fmtMoney = n => CUR + " " + n.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtPct = n => n.toFixed(2) + "%";
const fmtDash = f => n => (n > 0 && isFinite(n)) ? f(n) : "–";  // show "–" instead of 0

function freqBadge(f) {
  const cls = f >= 7 ? "f-red" : (f >= 3 ? "f-amber" : "f-green");
  return `<span class="badge ${cls}">${f.toFixed(2)}×</span>`;
}

function accountTotals(acc) {
  const t = {spend: 0, impressions: 0, reach: 0, clicks: 0, installs: 0};
  acc.creatives.forEach(c => { t.spend += c.spend; t.impressions += c.impressions; t.reach += c.reach; t.clicks += c.clicks; t.installs += (c.installs || 0); });
  t.ctr = t.impressions ? t.clicks / t.impressions * 100 : 0;
  t.count = acc.creatives.length;
  return t;
}

// Merge ads that share the same creative name into one row (sums + recomputed rates).
function aggregateByName(creatives) {
  const map = new Map();
  creatives.forEach(c => {
    const g = map.get(c.name) || {name: c.name, ads: 0, spend: 0, impressions: 0, reach: 0, clicks: 0, installs: 0};
    g.ads++; g.spend += c.spend; g.impressions += c.impressions; g.reach += c.reach;
    g.clicks += c.clicks; g.installs += (c.installs || 0);
    map.set(c.name, g);
  });
  return [...map.values()].map(g => ({
    ...g,
    ctr: g.impressions ? g.clicks / g.impressions * 100 : 0,
    cpc: g.clicks ? g.spend / g.clicks : 0,
    cpm: g.impressions ? g.spend / g.impressions * 1000 : 0,
    frequency: g.reach ? g.impressions / g.reach : 0,
    cpi: g.installs ? g.spend / g.installs : 0,
  }));
}

// Per-ad row: guarantee installs/cpi exist even for older data files.
function normalize(c) {
  const installs = c.installs || 0;
  return {...c, ads: 1, installs, cpi: c.cpi != null ? c.cpi : (installs ? c.spend / installs : 0)};
}

function renderCards() {
  const g = {spend: 0, impressions: 0, clicks: 0, installs: 0, count: 0};
  DATA.accounts.forEach(a => { const t = accountTotals(a); g.spend += t.spend; g.impressions += t.impressions; g.clicks += t.clicks; g.installs += t.installs; g.count += t.count; });
  const avgCtr = g.impressions ? g.clicks / g.impressions * 100 : 0;
  const cpi = g.installs ? g.spend / g.installs : 0;
  const cards = [
    {k: "Total Spend", v: fmtMoney(g.spend), accent: true},
    {k: "Impressions", v: fmtInt(g.impressions)},
    {k: "Clicks", v: fmtInt(g.clicks)},
    {k: "Avg CTR", v: fmtPct(avgCtr)},
    {k: "Installs", v: g.installs ? fmtInt(g.installs) : "–"},
    {k: "Avg CPI", v: cpi ? fmtMoney(cpi) : "–"},
    {k: "Creatives", v: fmtInt(g.count) + " · " + DATA.accounts.length + " acc"},
  ];
  document.getElementById("cards").innerHTML = cards.map(c =>
    `<div class="card"><div class="k">${c.k}</div><div class="v ${c.accent ? "accent" : ""}">${c.v}</div></div>`
  ).join("");
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = DATA.accounts.map((a, i) =>
    `<div class="tab ${i === activeIdx ? "active" : ""}" onclick="selectTab(${i})">${a.label}<span class="g">${a.group || ""}</span></div>`
  ).join("");
}

function selectTab(i) { activeIdx = i; sortKey = "spend"; sortDir = -1; renderTabs(); renderPanel(); }
function sortBy(k) { if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; } renderPanel(); }
function setView(g) { grouped = g; sortKey = "spend"; sortDir = -1; renderControls(); renderPanel(); }

const COLS = [
  {k: "name", label: "Creative"},
  {k: "spend", label: "Spend", f: fmtMoney},
  {k: "impressions", label: "Impr.", f: fmtInt},
  {k: "reach", label: "Reach", f: fmtInt},
  {k: "clicks", label: "Clicks", f: fmtInt},
  {k: "ctr", label: "CTR", f: fmtPct},
  {k: "cpc", label: "CPC", f: fmtMoney},
  {k: "cpm", label: "CPM", f: fmtMoney},
  {k: "installs", label: "Installs", f: fmtDash(fmtInt)},
  {k: "cpi", label: "CPI", f: fmtDash(fmtMoney)},
  {k: "frequency", label: "Freq", f: freqBadge},
];

function renderControls() {
  document.getElementById("btn-grouped").className = "ctl" + (grouped ? " active" : "");
  document.getElementById("btn-perad").className = "ctl" + (grouped ? "" : " active");
}

function renderPanel() {
  const acc = DATA.accounts[activeIdx];
  const t = accountTotals(acc);
  const rows = (grouped ? aggregateByName(acc.creatives) : acc.creatives.map(normalize))
    .sort((a, b) => {
      const x = a[sortKey], y = b[sortKey];
      if (typeof x === "string") return sortDir * x.localeCompare(y);
      return sortDir * (x - y);
    });
  const head = COLS.map(c =>
    `<th class="${c.k === sortKey ? "sorted" : ""}" onclick="sortBy('${c.k}')">${c.label}</th>`
  ).join("");
  const body = rows.map(r => "<tr>" + COLS.map(c => {
    if (c.k === "name") {
      const tag = (grouped && r.ads > 1) ? `<span class="pill">×${r.ads} ads</span>` : "";
      return `<td class="name" title="${r.name}">${r.name}${tag}</td>`;
    }
    return `<td>${c.f ? c.f(r[c.k]) : r[c.k]}</td>`;
  }).join("") + "</tr>").join("");
  const unit = grouped ? "creatives" : "ads";
  document.getElementById("panel").innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <b>${acc.label}</b>
        <span>Spend ${fmtMoney(t.spend)}</span>
        <span>Impr ${fmtInt(t.impressions)}</span>
        <span>Clicks ${fmtInt(t.clicks)}</span>
        <span>CTR ${fmtPct(t.ctr)}</span>
        ${t.installs ? `<span>Installs ${fmtInt(t.installs)}</span>` : ""}
        <span>${rows.length} ${unit}</span>
      </div>
      <div style="overflow-x:auto"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
    </div>`;
}

function applyRange(key) {
  curRange = key;
  DATA = {accounts: RANGES[key].accounts};
  activeIdx = Math.min(Math.max(activeIdx, 0), DATA.accounts.length - 1);
  document.getElementById("period").textContent = RANGES[key].period_label || "";
  renderCards(); renderTabs(); renderControls(); renderPanel();
}

fetch("./data/latest.json?v=" + Date.now())
  .then(r => r.json())
  .then(d => {
    RAW = d;
    // New schema has `ranges`; fall back to old flat schema for safety.
    RANGES = d.ranges || {all: {label: "", period_label: d.period_label, accounts: d.accounts}};
    const keys = Object.keys(RANGES);
    const sel = document.getElementById("range");
    sel.innerHTML = keys.map(k => `<option value="${k}">${RANGES[k].label || k}</option>`).join("");
    curRange = (d.default_range && RANGES[d.default_range]) ? d.default_range : keys[0];
    sel.value = curRange;
    sel.onchange = () => applyRange(sel.value);

    document.getElementById("generated").textContent = "Cập nhật: " + (d.generated_at || "").replace("T", " ").replace("Z", " UTC");
    document.getElementById("foot").textContent = "Freq badge:  <3× (ok) · 3–7× (theo dõi) · ≥7× (cao)  ·  Gom theo creative: reach là tổng (ước lượng)  —  data từ Meta Marketing API";
    document.getElementById("btn-grouped").onclick = () => setView(true);
    document.getElementById("btn-perad").onclick = () => setView(false);
    applyRange(curRange);
  })
  .catch(e => { document.getElementById("panel").innerHTML = `<div class="err">Không load được data/latest.json<br>${e}</div>`; });
</script>
</body>
</html>
