name: Weekly Creative Performance

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 02:00 UTC = 09:00 ICT
  workflow_dispatch:        # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write           # needed to commit the refreshed JSON

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python build_report.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git diff --staged --quiet || git commit -m "data: refresh creative report $(date -u +%Y-%m-%d)"
          git push
